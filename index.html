<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>행운의 로또 번호 추천</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">
    <div class="theme-toggle">
        <button id="theme-btn">☀️ 라이트 모드</button>
    </div>
    
    <div class="container">
        <h1>✨ 오늘의 행운 번호 ✨</h1>
        <p class="subtitle">당신의 당첨을 기원합니다!</p>
        
        <div id="lotto-results-container" class="results-wrapper">
            <!-- 5개 세트가 여기에 생성됩니다 -->
            <div class="empty-state">번호 생성하기를 눌러주세요!</div>
        </div>

        <div class="actions">
            <button id="generate-btn">번호 5개 세트 생성하기</button>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
